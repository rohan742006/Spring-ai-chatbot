<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI</title>

  <style>

    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }

    body{
    background:#f9f9f9;
    display:flex;
    justify-content:center;
    min-height:100vh;
    }

    /* Sidebar */

    #side{
    position:fixed;
    left:-280px;
    top:0;
    width:280px;
    height:100%;
    background:#e5e5e5;
    border-right:1px solid #eee;
    z-index:1000;
    transition:0.3s;
    display:flex;
    flex-direction:column;
    padding:20px;
    }

    #side.open{
    left:0;
    }

    #over{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.1);
    display:none;
    z-index:999;
    }

    /* Main Layout */

    #main{
    width:100%;
    max-width:800px;
    display:flex;
    flex-direction:column;
    position:relative;
    height:100vh;
    }

    header{
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    }

    .menu{
    font-size:24px;
    color:#555;
    cursor:pointer;
    }

    .prof{
    position:relative;
    width:34px;
    height:34px;
    background:#ececec;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:600;
    color:#666;
    }

    /* Chat Window */

    #win{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    scrollbar-width:none;
    }

    #win::-webkit-scrollbar{
    display:none;
    }

    #hero{
    margin:auto;
    text-align:center;
    padding-bottom:50px;
    }

    #hero h1{
    font-size:clamp(1.8rem,5vw,2.2rem);
    font-weight:600;
    color:#111;
    }

    /* Messages */

    .msg{
    margin-bottom:24px;
    line-height:1.6;
    font-size:16px;
    max-width:85%;
    }

    .user{
    align-self:flex-end;
    background:#f4f4f4;
    padding:12px 20px;
    border-radius:18px 18px 4px 18px;
    }

    .ai{
    align-self:flex-start;
    padding:12px 0;
    color:#1a1a1a;
    }

    /* Suggestion Chips */

    #chips{
    display:flex;
    gap:10px;
    padding:10px 20px;
    overflow-x:auto;
    }

    .chip{
    background:#fff;
    border:1px solid #e5e5e5;
    padding:10px 18px;
    border-radius:14px;
    font-size:14px;
    cursor:pointer;
    white-space:nowrap;
    }

    /* Input Section */

    #in-sec{
    padding:10px 20px 24px;
    }

    .bar{
    background:#ffffff;
    border-radius:26px;
    padding:10px 12px 10px 20px;
    border:1px solid #e5e5e5;
    display:flex;
    align-items:center;
    }

    textarea{
    flex:1;
    border:none;
    background:transparent;
    outline:none;
    font-size:16px;
    resize:none;
    padding:8px 0;
    max-height:180px;
    width:100%;
    }

    #btn{
    background:#000;
    color:#fff;
    border:none;
    width:34px;
    height:34px;
    border-radius:50%;
    cursor:pointer;
    font-size:18px;
    margin-left:10px;
    }

    /* History */

    .hist{
    padding:10px 12px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
    margin-bottom:4px;
    }

    .hist:hover{
    background:#ececec;
    }

    /* Mobile Fix */

    @media (max-width:600px){

    #main{
    height:100vh;
    }

    #in-sec{
    padding:10px 12px 20px;
    }

    .bar{
    padding:8px 10px 8px 14px;
    }

    #chips{
    padding:8px 12px;
    }

    }

  </style>
</head>

<body>

<div id="over" onclick="menu()"></div>

<div id="side">

  <button style="padding:12px;margin-bottom:20px;background:#fff;border-radius:10px;border:1px solid #ddd;cursor:pointer;font-weight:600;" onclick="reset()">
    ＋ New Chat
  </button>

  <h2 style="font-size:11px;color:#999;text-transform:uppercase;margin-bottom:10px;">
    History
  </h2>

  <ul id="h-list" style="list-style:none"></ul>

</div>

<div id="main">

  <header>
    <span class="menu" onclick="menu()">☰</span>
    <div class="prof">AI</div>
  </header>

  <div id="win">
    <div id="hero">
      <h1>What can I help with?</h1>
    </div>
  </div>

  <div id="chips">

    <div class="chip" onclick="fill('Explain a complex topic in simple terms')">💡 Explain a topic</div>

    <div class="chip" onclick="fill('Help me write a professional email')">📝 Write an email</div>

    <div class="chip" onclick="fill('Summarize this text for me')">📄 Summarize text</div>

    <div class="chip" onclick="fill('Give me a quick 5-minute recipe')">🍳 Quick recipe</div>

  </div>

  <div id="in-sec">

    <div class="bar">

<textarea id="q"
          rows="1"
          placeholder="Ask anything"
          oninput="this.style.height='';this.style.height=this.scrollHeight+'px'"
          onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ask();}">
</textarea>

      <button id="btn" onclick="ask()">↑</button>

    </div>

    <p style="text-align:center;font-size:11px;color:#aaa;margin-top:12px;">
      AI can make mistakes. Check important info.
    </p>

  </div>

</div>

<script>

  const $ = id => document.getElementById(id);

  const menu = () => {
  let o = $('side').classList.toggle('open');
  $('over').style.display = o ? 'block' : 'none';
  };

  const reset = () => {
  $('win').innerHTML = `<div id="hero"><h1>What can I help with?</h1></div>`;
  menu();
  };

  const fill = t => {
  $('q').value = t;
  $('q').style.height = 'auto';
  $('q').style.height = $('q').scrollHeight + 'px';
  $('q').focus();
  };

  function addHistory(t){
  let li=document.createElement('li');
  li.className='hist';
  li.textContent=t;

  li.onclick=()=>{
  fill(t);
  menu();
  };

  $('h-list').prepend(li);
  }

  async function ask(){

  let t=$('q').value.trim();
  if(!t) return;

  if($('hero')) $('hero').style.display='none';

  addHistory(t);

  $('win').innerHTML+=`<div class="msg user">${t}</div><div class="msg ai" id="last">...</div>`;

  $('q').value="";
  $('q').style.height='auto';

  $('win').scrollTop=$('win').scrollHeight;

  try{

  let r=await fetch("/ask?q="+encodeURIComponent(t));
  let rd=r.body.getReader();
  let dec=new TextDecoder();

  let last=$('last');
  last.id="";
  last.textContent="";

  while(true){

  let {done,value}=await rd.read();
  if(done) break;

  last.textContent+=dec.decode(value);
  $('win').scrollTop=$('win').scrollHeight;

  }

  }catch(e){
  $('last').textContent="Connection error.";
  }

  }

</script>

</body>
</html>
